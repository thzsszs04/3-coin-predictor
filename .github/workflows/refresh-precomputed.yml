name: Refresh precomputed forecasts

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 01:30 WIB (18:30 UTC).
    - cron: "30 18 * * *"

permissions:
  contents: write

jobs:
  refresh-precomputed:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate precomputed forecast snapshot
        env:
          FAST_SARIMAX: "1"
        run: python scripts/precompute_results.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/precomputed_results.pkl
          if git diff --cached --quiet; then
            echo "No precomputed snapshot changes to commit."
          else
            git commit -m "Refresh precomputed forecast snapshot"
            git push
          fi
